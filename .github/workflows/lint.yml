name: Lint

on: workflow_call

jobs:
  check-code:
    name: Check codebase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-key: "lint"

      - name: Install mise
        uses: jdx/mise-action@v3

      - name: Run all codebase checks
        run: prek run -av --hook-stage pre-push

  check-npm:
    name: Verify npm package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: npm

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Check syntax
        run: node --check bin/mdlint.js

      - name: Check package
        run: npm pack --dry-run

  check-python:
    name: Verify Python package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: python

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Check syntax
        run: uv run python -m py_compile mdlint/__init__.py mdlint/__main__.py

      - name: Build wheel
        run: uv build --wheel

      - name: Check package metadata
        run: uvx twine check dist/*.whl

  docker-dogfood:
    name: Docker dogfood
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: mdlint:dogfood
          cache-from: type=gha,scope=docker-dogfood
          cache-to: type=gha,mode=max,scope=docker-dogfood

      - name: Run dogfood check
        run: docker run --rm -w /workspace -v "$PWD:/workspace" mdlint:dogfood check

      - name: Run dogfood format
        run: docker run --rm -w /workspace -v "$PWD:/workspace" mdlint:dogfood format
