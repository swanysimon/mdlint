name: npm

on:
  workflow_call:
    inputs:
      release:
        description: GitHub release tag to download binaries from and publish to npm
        required: true
        type: string

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: npm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: npm

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Download binaries from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: npm/bin
        run: |
          gh release download '${{ inputs.release }}' \
            --pattern 'mdlint-linux-x86_64' \
            --pattern 'mdlint-linux-x86_64-musl' \
            --pattern 'mdlint-linux-aarch64' \
            --pattern 'mdlint-linux-aarch64-musl' \
            --pattern 'mdlint-macos-x86_64' \
            --pattern 'mdlint-macos-aarch64' \
            --pattern 'mdlint-windows-x86_64.exe' \
            --dir /tmp/binaries \
            --repo '${{ github.repository }}'

          mv /tmp/binaries/mdlint-linux-x86_64       mdlint-linux-x64
          mv /tmp/binaries/mdlint-linux-x86_64-musl  mdlint-linux-x64-musl
          mv /tmp/binaries/mdlint-linux-aarch64      mdlint-linux-arm64
          mv /tmp/binaries/mdlint-linux-aarch64-musl mdlint-linux-arm64-musl
          mv /tmp/binaries/mdlint-macos-x86_64       mdlint-darwin-x64
          mv /tmp/binaries/mdlint-macos-aarch64      mdlint-darwin-arm64
          mv /tmp/binaries/mdlint-windows-x86_64.exe mdlint-win32-x64.exe

          chmod +x mdlint-*

      - name: Publish to npm
        run: npm publish --access public --provenance
